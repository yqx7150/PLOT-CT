# general settings
name: test_DiffIRS2
model_type: DiffIRS2Model
scale: 1
num_gpu: auto  # auto: can infer from your visible devices automatically. official: 4 GPUs
manual_seed: 0

# dataset and data loader settings
datasets:
  # Uncomment these for validation
  val_1:
    name: AAPM
    type: DeblurPairedDataset
    #dataroot_gt: /home/un/world/yx/DiffIR-master/DiffIR-demotionblur/test_img/train/full
    #dataroot_lq: /home/un/world/yx/DiffIR-master/DiffIR-demotionblur/test_img/train/low
    dataroot_gt: /home/un/world/yx/DiffIR-master/DiffIR-demotionblur/pre_test_datasets_5e3/val1/full
    dataroot_lq: /home/un/world/yx/DiffIR-master/DiffIR-demotionblur/pre_test_datasets_5e3/val1/low
#    dataroot_gt: /home/un/world/yx/datasets/CHAOS/test1e4/val1/full
#    dataroot_lq: /home/un/world/yx/datasets/CHAOS/test1e4/val1/low
    #dataroot_gt: /home/un/world/yx/datasets/test/5e3/full
    #dataroot_lq: /home/un/world/yx/datasets/test/5e3/low
    io_backend:
      type: disk

  val_2:
    name: AAPM
    type: DeblurPairedDataset
    #dataroot_gt: /home/un/world/yx/DiffIR-master/DiffIR-demotionblur/test_img/train/full
    #dataroot_lq: /home/un/world/yx/DiffIR-master/DiffIR-demotionblur/test_img/train/low
    dataroot_gt: /home/un/world/yx/DiffIR-master/DiffIR-demotionblur/pre_test_datasets_5e3/val1/full
    dataroot_lq: /home/un/world/yx/DiffIR-master/DiffIR-demotionblur/pre_test_datasets_5e3/val1/low
#    dataroot_gt: /home/un/world/yx/datasets/CHAOS/test1e4/val1/full
#    dataroot_lq: /home/un/world/yx/datasets/CHAOS/test1e4/val1/low
    #dataroot_gt: /home/un/world/yx/datasets/test/5e3/full
    #dataroot_lq: /home/un/world/yx/datasets/test/5e3/low
    io_backend:
      type: disk

# network structures
network_g:
  type: DiffIRS2
  n_encoder_res: 6
  inp_channels: 3
  out_channels: 3
  dim: 24
  num_blocks: [1,3,4,5] #[3,5,6,6]
  num_refinement_blocks: 4
  heads: [1,2,4,8] #[1,2,4,8]
  ffn_expansion_factor: 1
  bias: False
  LayerNorm_type: WithBias
  n_denoise_res: 1
  linear_start: 0.1
  linear_end: 0.99
  timesteps: 4

# network structures
network_S1:
  type: DiffIRS1
  n_encoder_res: 6
  inp_channels: 3
  out_channels: 3
  dim: 24
  num_blocks: [1,3,4,5] #[3,5,6,6]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 1
  bias: False
  LayerNorm_type: WithBias

# path
path:
  # use the pre-trained Real-ESRNet model

  pretrain_network_g: /home/un/world/yx/PLOT-CT/experiments/train_DiffIRS2/net_g_300000.pth
  pretrain_network_S1: /home/un/world/yx/PLOT-CT/experiments/train_DiffIRS1/net_g_285000.pth
#  pretrain_network_g: /home/un/world/yx/DiffIR-master/DiffIR-demotionblur/models/pre_s2/net_g_300000.pth
#  pretrain_network_S1: /home/un/world/yx/DiffIR-master/DiffIR-demotionblur/models/pre_s1/net_g_285000.pth
  #pretrain_network_g: /home/un/world/yx/DiffIR-master/DiffIR-demotionblur/experiments/train_DiffIRS2/models/net_g_5000.pth
  #pretrain_network_S1: /home/un/world/yx/DiffIR-master/DiffIR-demotionblur/experiments/train_DiffIRS1/models/net_g_300000.pth
  param_key_g: params_ema
  strict_load_g: False
  ignore_resume_networks: network_S1

val:
  save_img: True
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name
      type: calculate_psnr
      crop_border: 0
      test_y_channel: False



